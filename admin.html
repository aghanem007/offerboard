<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mod Panel — Offerboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-nav="admin" data-page="admin">
  <div id="chromeTop"></div>

  <!-- Non-staff gate -->
  <section class="gate-shell" id="adminGate" style="display:none;">
    <div class="container">
      <div class="gate-card">
        <p class="gate-title">Staff only.</p>
        <p>This page is for moderators and admins. If that's supposed to be you, sign in first.</p>
        <a href="index.html" class="btn">Back to the board</a>
      </div>
    </div>
  </section>

  <section id="adminPanel" style="display:none;">
    <div class="container admin-panel">
      <div class="admin-header">
        <h1>Mod Panel</h1>
        <input type="text" class="admin-search" id="adminSearch" placeholder="Search members...">
      </div>

      <div class="admin-stats" id="adminStats"></div>

      <div class="admin-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Member</th>
              <th>Posts</th>
              <th>Joined</th>
              <th>Warnings</th>
              <th>Status</th>
              <th>Role</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="7" class="admin-empty">Loading members...</td></tr>
          </tbody>
        </table>
      </div>

      <h2 class="admin-section-title">Moderation Log</h2>
      <div class="admin-card">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Action</th>
              <th>Moderator</th>
              <th>Reason</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="modLogBody">
            <tr><td colspan="4" class="admin-empty">Loading log...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

  <div id="chromeBottom"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/render.js"></script>
  <script src="js/forum-api.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function () {
      'use strict';

      var allUsers = [];
      var isAdmin = false;

      function shortDate(dateStr) {
        if (!dateStr) return '';
        var d = new Date(dateStr);
        var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        return months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
      }

      window.onAuthReady(function () {
        var gate = document.getElementById('adminGate');
        var panel = document.getElementById('adminPanel');

        isAdmin = window.hasRole && window.hasRole('admin');

        if (window.hasRole && window.hasRole('moderator')) {
          panel.style.display = 'block';
          wireTable();
          wireSearch();
          loadUsers();
          loadModLog();
        } else {
          gate.style.display = 'block';
        }
      });

      async function loadUsers() {
        var { data, error } = await window._supabase
          .from('profiles')
          .select('*')
          .order('created_at', { ascending: true });

        if (error) {
          console.error('loadUsers:', error);
          document.getElementById('userTableBody').innerHTML =
            '<tr><td colspan="7" class="admin-empty">Couldn\'t load members.</td></tr>';
          return;
        }

        allUsers = data || [];
        renderStats();
        renderUsers(allUsers);
      }

      function renderStats() {
        var stats = { member: 0, moderator: 0, admin: 0, banned: 0 };
        allUsers.forEach(function (u) {
          if (stats[u.role] !== undefined) stats[u.role]++;
          if (u.banned) stats.banned++;
        });

        document.getElementById('adminStats').innerHTML =
          '<div class="admin-stat-card"><div class="stat-value">' + allUsers.length + '</div><div class="stat-label">Total</div></div>' +
          '<div class="admin-stat-card"><div class="stat-value">' + stats.member + '</div><div class="stat-label">Members</div></div>' +
          '<div class="admin-stat-card"><div class="stat-value">' + stats.moderator + '</div><div class="stat-label">Mods</div></div>' +
          '<div class="admin-stat-card"><div class="stat-value">' + stats.admin + '</div><div class="stat-label">Admins</div></div>' +
          '<div class="admin-stat-card alert"><div class="stat-value">' + stats.banned + '</div><div class="stat-label">Banned</div></div>';
      }

      function renderUsers(users) {
        var tbody = document.getElementById('userTableBody');

        if (!users.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="admin-empty">No members match.</td></tr>';
          return;
        }

        tbody.innerHTML = users.map(function (user) {
          var role = user.role || 'member';

          var roleCell;
          if (isAdmin) {
            roleCell =
              '<select class="role-select" data-user-id="' + escapeHTML(user.user_id) + '" data-original="' + escapeHTML(role) + '">' +
                '<option value="member"' + (role === 'member' ? ' selected' : '') + '>Member</option>' +
                '<option value="moderator"' + (role === 'moderator' ? ' selected' : '') + '>Moderator</option>' +
                '<option value="admin"' + (role === 'admin' ? ' selected' : '') + '>Admin</option>' +
              '</select>';
          } else {
            roleCell = roleBadge(role);
          }

          var actions = '';
          if (isAdmin) {
            actions += '<button class="admin-btn save" data-action="save-role" data-user-id="' + escapeHTML(user.user_id) + '" disabled>Save</button> ';
          }
          if (role !== 'admin') {
            actions += user.banned
              ? '<button class="admin-btn unban" data-action="unban" data-user-id="' + escapeHTML(user.user_id) + '" data-username="' + escapeHTML(user.username) + '">Unban</button>'
              : '<button class="admin-btn ban" data-action="ban" data-user-id="' + escapeHTML(user.user_id) + '" data-username="' + escapeHTML(user.username) + '">Ban</button>';
          }

          return '<tr>' +
            '<td><div class="user-cell">' + avatarHTML(user.avatar_letter, user.avatar_color, 'sm') +
              '<span>' + escapeHTML(user.username) + '</span></div></td>' +
            '<td class="mono">' + (user.post_count || 0) + '</td>' +
            '<td class="muted">' + shortDate(user.created_at) + '</td>' +
            '<td>' + (user.warning_count > 0 ? '<span class="warn-count">' + user.warning_count + '</span>' : '<span class="muted">0</span>') + '</td>' +
            '<td>' + (user.banned ? '<span class="status-banned">Banned</span>' : '<span class="status-active">Active</span>') + '</td>' +
            '<td>' + roleCell + '</td>' +
            '<td style="white-space:nowrap;">' + actions + '</td>' +
          '</tr>';
        }).join('');
      }

      // One delegated listener for the whole table — survives re-renders
      function wireTable() {
        var tbody = document.getElementById('userTableBody');

        tbody.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-action]');
          if (!btn) return;
          var action = btn.getAttribute('data-action');
          var userId = btn.getAttribute('data-user-id');
          var username = btn.getAttribute('data-username');

          if (action === 'ban') handleBan(userId, username);
          else if (action === 'unban') handleUnban(userId, username);
          else if (action === 'save-role') handleSaveRole(btn, userId);
        });

        tbody.addEventListener('change', function (e) {
          var select = e.target.closest('.role-select');
          if (!select) return;
          var saveBtn = tbody.querySelector('.admin-btn[data-action="save-role"][data-user-id="' + select.getAttribute('data-user-id') + '"]');
          if (saveBtn) saveBtn.disabled = (select.value === select.getAttribute('data-original'));
        });
      }

      function wireSearch() {
        var input = document.getElementById('adminSearch');
        input.addEventListener('input', function () {
          var q = input.value.trim().toLowerCase();
          renderUsers(q ? allUsers.filter(function (u) {
            return (u.username || '').toLowerCase().indexOf(q) !== -1;
          }) : allUsers);
        });
      }

      async function handleSaveRole(btn, userId) {
        var select = document.querySelector('.role-select[data-user-id="' + userId + '"]');
        if (!select) return;
        var newRole = select.value;

        btn.disabled = true;
        btn.textContent = 'Saving...';

        var { error } = await window._supabase
          .from('profiles')
          .update({ role: newRole })
          .eq('user_id', userId);

        btn.textContent = 'Save';

        if (error) {
          showToast('Role change failed: ' + error.message, 'error');
          btn.disabled = false;
          return;
        }

        select.setAttribute('data-original', newRole);
        var user = allUsers.find(function (u) { return u.user_id === userId; });
        if (user) user.role = newRole;
        renderStats();
        renderUsers(currentFilter());
        showToast('Role updated.', 'success');
        logModAction('change_role', userId, 'user', 'Set role to ' + newRole);
      }

      async function handleBan(userId, username) {
        var reason = await openDialog({
          title: 'Ban ' + username,
          inputLabel: 'Reason (visible to staff)',
          confirmText: 'Ban Member',
          danger: true
        });
        if (!reason) return;

        try {
          await banUser(userId, reason);
          await logModAction('ban_user', userId, 'user', reason);
          var user = allUsers.find(function (u) { return u.user_id === userId; });
          if (user) { user.banned = true; user.ban_reason = reason; }
          renderStats();
          renderUsers(currentFilter());
          showToast(username + ' banned.', 'success');
        } catch (err) {
          showToast('Ban failed: ' + err.message, 'error');
        }
      }

      async function handleUnban(userId, username) {
        var confirmed = await openDialog({
          title: 'Unban ' + username + '?',
          message: 'They\'ll be able to post again immediately.',
          confirmText: 'Unban'
        });
        if (!confirmed) return;

        try {
          await unbanUser(userId);
          await logModAction('unban_user', userId, 'user');
          var user = allUsers.find(function (u) { return u.user_id === userId; });
          if (user) { user.banned = false; user.ban_reason = null; }
          renderStats();
          renderUsers(currentFilter());
          showToast(username + ' unbanned.', 'success');
        } catch (err) {
          showToast('Unban failed: ' + err.message, 'error');
        }
      }

      function currentFilter() {
        var q = document.getElementById('adminSearch').value.trim().toLowerCase();
        return q ? allUsers.filter(function (u) {
          return (u.username || '').toLowerCase().indexOf(q) !== -1;
        }) : allUsers;
      }

      async function loadModLog() {
        var actions = await getModActions();
        var tbody = document.getElementById('modLogBody');

        if (!actions.length) {
          tbody.innerHTML = '<tr><td colspan="4" class="admin-empty">Quiet so far. No actions logged.</td></tr>';
          return;
        }

        var modIds = actions.map(function (a) { return a.mod_id; })
          .filter(function (id, i, arr) { return arr.indexOf(id) === i; });

        var { data: modProfiles } = await window._supabase
          .from('profiles')
          .select('user_id, username')
          .in('user_id', modIds);

        var names = {};
        (modProfiles || []).forEach(function (p) { names[p.user_id] = p.username; });

        tbody.innerHTML = actions.map(function (a) {
          var label = a.action_type.replace(/_/g, ' ');
          var badgeClass = a.action_type.indexOf('ban') !== -1 ? 'badge-admin'
                          : a.action_type.indexOf('warn') !== -1 ? 'badge-pinned'
                          : 'badge-moderator';
          return '<tr>' +
            '<td><span class="badge ' + badgeClass + '">' + escapeHTML(label) + '</span></td>' +
            '<td>' + escapeHTML(names[a.mod_id] || 'Unknown') + '</td>' +
            '<td class="muted" style="max-width:320px;overflow:hidden;text-overflow:ellipsis;">' + escapeHTML(a.reason || '—') + '</td>' +
            '<td class="muted">' + shortDate(a.created_at) + '</td>' +
          '</tr>';
        }).join('');
      }
    })();
  </script>
</body>
</html>
