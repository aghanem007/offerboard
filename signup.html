<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join — Offerboard</title>
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Instrument+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-body" data-page="signup">
  <div class="topbar">
    <div class="container topbar-inner">
      <span class="topbar-tag">For CS students chasing offer #1</span>
      <div class="auth-links">
        <a href="index.html" class="btn small ghost">Back to the board</a>
      </div>
    </div>
  </div>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <img src="assets/logo.svg" alt="Offerboard logo">
        <div>
          <h1>Join Offerboard</h1>
          <p>Free forever. Your future TC will thank you.</p>
        </div>
      </div>

      <form class="auth-form" id="signupForm" novalidate>
        <label for="displayName">
          <span>Display name</span>
          <input type="text" id="displayName" placeholder="whatever you go by" required minlength="3" maxlength="40" autocomplete="username">
        </label>
        <label for="email">
          <span>Email</span>
          <input type="email" id="email" placeholder="you@school.edu" required autocomplete="email">
        </label>
        <label for="password">
          <span>Password</span>
          <input type="password" id="password" placeholder="8+ characters" required minlength="8" autocomplete="new-password">
        </label>
        <label for="confirmPassword">
          <span>Confirm password</span>
          <input type="password" id="confirmPassword" placeholder="same thing again" required autocomplete="new-password">
        </label>
        <p class="form-error" id="signupError" hidden></p>
        <label class="checkbox">
          <input type="checkbox" id="agreeTerms" required>
          <span>I agree to the <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a></span>
        </label>
        <button type="submit" class="btn full">Create my account</button>
      </form>

      <div id="signupMessage" class="auth-message" style="display:none;"></div>

      <div class="auth-note">
        Already a member? <a href="index.html">Sign in from the board</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script>
    (function () {
      'use strict';

      var form = document.getElementById('signupForm');
      var password = document.getElementById('password');
      var confirmPassword = document.getElementById('confirmPassword');
      var errorEl = document.getElementById('signupError');
      var message = document.getElementById('signupMessage');

      function showError(text) {
        errorEl.textContent = text;
        errorEl.hidden = false;
      }

      function validate() {
        var name = document.getElementById('displayName').value.trim();
        var email = document.getElementById('email').value.trim();

        if (name.length < 3) return 'Display name needs at least 3 characters.';
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return 'That email doesn’t look right.';
        if (password.value.length < 8) return 'Password needs at least 8 characters.';
        if (password.value !== confirmPassword.value) return 'Passwords don’t match.';
        if (!document.getElementById('agreeTerms').checked) return 'You’ll need to accept the terms.';
        return null;
      }

      confirmPassword.addEventListener('input', function () {
        if (confirmPassword.value && password.value !== confirmPassword.value) {
          showError('Passwords don’t match.');
        } else {
          errorEl.hidden = true;
        }
      });

      form.addEventListener('submit', async function (e) {
        e.preventDefault();

        var problem = validate();
        if (problem) { showError(problem); return; }
        errorEl.hidden = true;

        var submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating account...';

        try {
          var { error } = await window._supabase.auth.signUp({
            email: document.getElementById('email').value.trim(),
            password: password.value,
            options: {
              data: { display_name: document.getElementById('displayName').value.trim() }
            }
          });

          if (error) {
            showError(error.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Create my account';
            return;
          }

          form.style.display = 'none';
          message.style.display = 'block';
          message.className = 'auth-message success';
          message.innerHTML =
            '<p><strong>You’re in.</strong></p>' +
            '<p>Check your inbox for a verification link, then sign in from the board.</p>' +
            '<a href="index.html" class="btn">Back to the board</a>';
        } catch (err) {
          showError('Something went wrong. Check your connection and try again.');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create my account';
        }
      });
    })();
  </script>
</body>
</html>
